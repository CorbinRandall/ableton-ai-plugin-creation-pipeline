name: sanity

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install python-osc
      - run: python -m compileall -q scripts tooling projects
      - run: python scripts/check_projects_allowlist.py
